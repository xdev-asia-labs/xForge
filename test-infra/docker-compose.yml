services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    container_name: xforge-node1
    hostname: node1
    ports:
      - "2201:22"
    networks:
      xforge-test:
        ipv4_address: 172.28.0.11

  node2:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    container_name: xforge-node2
    hostname: node2
    ports:
      - "2202:22"
    networks:
      xforge-test:
        ipv4_address: 172.28.0.12

  node3:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    container_name: xforge-node3
    hostname: node3
    ports:
      - "2203:22"
    networks:
      xforge-test:
        ipv4_address: 172.28.0.13

networks:
  xforge-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
